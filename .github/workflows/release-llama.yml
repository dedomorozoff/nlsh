name: Build with llama.cpp

on:
  push:
    tags:
      - 'llama-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            goos: linux
            goarch: amd64
            ext: ""
            shell: bash
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: .exe
            shell: pwsh
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
            shell: bash
          - os: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
            shell: bash

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install deps (Linux)
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Install deps (macOS)
        if: matrix.goos == 'darwin'
        run: brew install cmake

      - name: Build llama.cpp
        run: |
          cmake -G "Unix Makefiles" -S third_party/llama.cpp -B third_party/llama.cpp/build -DBUILD_SHARED_LIBS=OFF -DLLAMA_BUILD_TESTS=OFF -DLLAMA_BUILD_EXAMPLES=OFF -DCMAKE_BUILD_TYPE=Release
          cmake --build third_party/llama.cpp/build --config Release --parallel 2

      - name: Build nlsh
        run: |
          mkdir -p bin
          go build -tags llama -ldflags="-s -w" -o bin/nlsh${{ matrix.ext }} ./cmd/nlsh
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nlsh-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          path: bin/nlsh${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Package
        run: |
          mkdir -p dist
          cp release/nlsh-*/* dist/
          ls -la dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: true
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}